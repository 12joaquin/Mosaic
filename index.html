<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Mosaic Gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: sans-serif; }
  h1 { text-align: center; padding: 24px; font-size: 1.6em; letter-spacing: 2px; color: #fff; }
  .count { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.9em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; padding: 16px; }
  .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; cursor: pointer;
               transition: transform 0.2s, opacity 0.2s; opacity: 0.85; }
  .card img:hover { transform: scale(1.04); opacity: 1; }
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
               align-items: center; justify-content: center; z-index: 999; cursor: zoom-out; }
  #lightbox.active { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
</style>
</head>
